<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de tarefas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Lista de tarefas do Heitor </h1>
        <input type="text" id="tarefa" placeholder="Insira sua tarefa">
        <select id="prioridade">
            <option>Alta</option>
            <option>Média</option>
            <option>Baixa</option>
        </select>
        <button onclick="mostrarsite()">Mostrar no site</button>
    </header>
    <div id="listaTarefas" class="container-tarefas"></div>
    <script>
        function mostrarsite(){
            let trf=document.getElementById("tarefa").value;
            let pdd=document.getElementById("prioridade").value;
            let p=document.createElement("p");
            p.innerText=trf;
            let cor;
            if (pdd=="Alta"){
                cor="red";
            } 
            else if (pdd=="Média"){
                cor="DarkGoldenRod";
            } 
            else{
                cor="green";
            }
            let div=document.createElement("div");
            div.classList.add("card");
            div.style.backgroundColor=cor;
            div.appendChild(p);
            document.getElementById("listaTarefas").appendChild(div);
        }
    </script>
</body>
</html>
